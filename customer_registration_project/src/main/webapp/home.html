<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Management System</title>

<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: Arial, sans-serif;
}

body {
	height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	background: linear-gradient(135deg, #4A90E2, #6A5ACD);
}

.container {
	text-align: center;
	background: #fff;
	padding: 40px;
	border-radius: 12px;
	box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
	width: 400px;
}

h1 {
	color: #333;
	margin-bottom: 15px;
}

p {
	color: #666;
	margin-bottom: 30px;
}

.btn {
	display: block;
	width: 100%;
	padding: 12px;
	margin: 10px 0;
	text-decoration: none;
	color: white;
	border-radius: 6px;
	font-size: 16px;
	transition: 0.3s;
}

.register-btn {
	background-color: #28a745;
}

.register-btn:hover {
	background-color: #218838;
}

.login-btn {
	background-color: #007bff;
}

.login-btn:hover {
	background-color: #0056b3;
}
</style>
</head>
<body>

	<div class="container">
		<h1>Customer Management System</h1>
		<p>Welcome! Please choose an option below.</p>

		<a href="register.html" class="btn register-btn"> Register </a> <a
			href="login.html" class="btn login-btn"> Login </a>
	</div>

</body>
</html>
