<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Registration</title>
<style>
body {
	font-family: Arial, sans-serif;
	background: #f4f6f9;
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
}

.container {
	background: white;
	padding: 25px;
	border-radius: 10px;
	width: 400px;
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
}

h2 {
	text-align: center;
	margin-bottom: 20px;
	color: #333;
}

.form-group {
	margin-bottom: 15px;
}

label {
	display: block;
	margin-bottom: 5px;
	font-weight: bold;
}

input, select {
	width: 100%;
	padding: 10px;
	border: 1px solid #ccc;
	border-radius: 5px;
}

button {
	width: 100%;
	padding: 12px;
	background: #007bff;
	color: white;
	border: none;
	border-radius: 5px;
	cursor: pointer;
	font-size: 16px;
}

button:hover {
	background: #0056b3;
}
</style>
</head>
<body>

	<div class="container">
		<h2>Customer Registration</h2>

		<form action="register" method="post">
			<div class="form-group">
				<label>Customer ID</label> <input type="text"
					placeholder="Enter Customer ID" name ="id">
			</div>

			<div class="form-group">
				<label>Full Name</label> <input type="text"
					placeholder="Enter Full Name" name ="name">
			</div>

			<div class="form-group">
				<label>Email</label> <input type="email" placeholder="Enter Email" name="email">
			</div>

			<div class="form-group">
				<label>Mobile Number</label> <input type="tel"
					placeholder="Enter Mobile Number" name="mobNo">	
							</div>

			<div class="form-group">
				<label>City</label> <input type="text" placeholder="Enter City" name="city">
			</div>

			<div class="form-group">
				<label>Password</label> <input type="password"
					placeholder="Enter Password" name="pass">
			</div>



			<button type="submit">Register Customer</button>
		</form>
	</div>

</body>
</html>
