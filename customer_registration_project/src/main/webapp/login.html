<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>

<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: Arial, sans-serif;
}

body {
	background: linear-gradient(135deg, #4A90E2, #6A5ACD);
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
}

.login-container {
	width: 350px;
	background: #fff;
	padding: 30px;
	border-radius: 12px;
	box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
}

.login-container h2 {
	text-align: center;
	margin-bottom: 25px;
	color: #333;
}

.form-group {
	margin-bottom: 18px;
}

.form-group label {
	display: block;
	margin-bottom: 6px;
	font-weight: bold;
	color: #555;
}

.form-group input {
	width: 100%;
	padding: 12px;
	border: 1px solid #ccc;
	border-radius: 6px;
	font-size: 14px;
}

.form-group input:focus {
	outline: none;
	border-color: #4A90E2;
	box-shadow: 0 0 5px rgba(74, 144, 226, 0.4);
}

.login-btn {
	width: 100%;
	padding: 12px;
	background: #4A90E2;
	color: white;
	border: none;
	border-radius: 6px;
	font-size: 16px;
	cursor: pointer;
	transition: 0.3s;
}

.login-btn:hover {
	background: #357ABD;
}

.footer-links {
	text-align: center;
	margin-top: 15px;
}

.footer-links a {
	text-decoration: none;
	color: #4A90E2;
	font-size: 14px;
}

.footer-links a:hover {
	text-decoration: underline;
}
</style>
</head>
<body>

	<div class="login-container">
		<h2>Customer Login</h2>

		<form action="login" method="post">
			<div class="form-group">
				<label for="username">Username</label> <input type="text"
					id="username" name="email" placeholder="Enter Username" required>
			</div>

			<div class="form-group">
				<label for="password">Password</label> <input type="password"
					id="password" name="pass" placeholder="Enter Password" required>
			</div>

			<button type="submit" class="login-btn">Login</button>

			<div class="footer-links">
				<a href="#">Forgot Password?</a>
			</div>
		</form>
	</div>

</body>
</html>
