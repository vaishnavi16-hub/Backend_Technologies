<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:800px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.container h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#555;
}

.form-group input,
.form-group select,
.form-group textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
    border-color:#4facfe;
    outline:none;
    box-shadow:0 0 5px rgba(79,172,254,0.5);
}

.btn{
    width:100%;
    padding:12px;
    background:#4facfe;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:#2f8dfd;
}

</style>
</head>

<body>

<div class="container">

<h2>Job Application Registration Form</h2>

<form action="register" method="post">

<div class="form-group">
<label>Application ID</label>
<input type="text" name="appId" required>
</div>

<div class="form-group">
<label>Full Name</label>
<input type="text" name="fullName" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Mobile Number</label>
<input type="tel" name="mobile" required>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" name="dob" required>
</div>

<div class="form-group">
<label>Gender</label>
<select name="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="form-group">
<label>Highest Qualification</label>
<select name="qualification">
<option>BCA</option>
<option>BSc</option>
<option>BE</option>
<option>B.Tech</option>
<option>MCA</option>
<option>M.Tech</option>
</select>
</div>

<div class="form-group">
<label>College Name</label>
<input type="text" name="college">
</div>

<div class="form-group">
<label>Passing Year</label>
<input type="number" name="passingYear">
</div>

<div class="form-group">
<label>Percentage / CGPA</label>
<input type="text" name="cgpa">
</div>

<div class="form-group">
<label>Skills</label>
<input type="text" name="skills" placeholder="Java, SQL, HTML, CSS">
</div>

<div class="form-group">
<label>Experience (Years)</label>
<input type="number" name="experience">
</div>

<div class="form-group">
<label>Expected Salary</label>
<input type="number" name="salary">
</div>

<div class="form-group">
<label>GitHub Profile</label>
<input type="url" name="github">
</div>

<div class="form-group">
<label>LinkedIn Profile</label>
<input type="url" name="linkedin">
</div>

<div class="form-group">
<label>Current Address</label>
<textarea rows="4" name="address"></textarea>
</div>

<div class="form-group">
<label>City</label>
<input type="text" name="city">
</div>

<div class="form-group">
<label>State</label>
<input type="text" name="state">
</div>

<div class="form-group">
<label>Pincode</label>
<input type="number" name="pincode">
</div>

<button type="submit" class="btn">
Apply Now
</button>

</form>

</div>

</body>
</html>
