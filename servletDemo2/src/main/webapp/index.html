<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Registration</title>

<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: Arial, sans-serif;
}

body {
	background: linear-gradient(135deg, #4facfe, #00f2fe);
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
}

.container {
	width: 450px;
	background: #fff;
	padding: 30px;
	border-radius: 15px;
	box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
}

.container h2 {
	text-align: center;
	margin-bottom: 20px;
	color: #333;
}

.form-group {
	margin-bottom: 15px;
}

.form-group label {
	display: block;
	margin-bottom: 6px;
	font-weight: bold;
	color: #555;
}

.form-group input {
	width: 100%;
	padding: 10px;
	border: 1px solid #ccc;
	border-radius: 8px;
	font-size: 14px;
	transition: 0.3s;
}

.form-group input:focus {
	border-color: #4facfe;
	outline: none;
	box-shadow: 0 0 5px rgba(79, 172, 254, 0.5);
}

.btn {
	width: 100%;
	padding: 12px;
	background: #4facfe;
	color: white;
	border: none;
	border-radius: 8px;
	font-size: 16px;
	cursor: pointer;
	transition: 0.3s;
}

.btn:hover {
	background: #2f8dfd;
}
</style>
</head>

<body>

	<div class="container">
		<h2>Employee Registration</h2>

		<form action="register" method="post">
			<div class="form-group">
				<label for="empid">Employee ID</label> <input type="text" id="empid"
					placeholder="Enter Employee ID" name="empid" required>
			</div>

			<div class="form-group">
				<label for="empname">Employee Name</label> <input type="text"
					id="empname" placeholder="Enter Employee Name" name="name" required>
			</div>

			<div class="form-group">
				<label for="salary">Salary</label> <input type="number" id="salary"
					placeholder="Enter Salary" name="salary" required>
			</div>

			<div class="form-group">
				<label for="city">City</label> <input type="text" id="city"
					placeholder="Enter City" name="city" required>
			</div>

			<div class="form-group">
				<label for="experience">Experience (Years)</label> <input
					type="number" id="experience" placeholder="Enter Experience"
					name="exp" required>
			</div>

			<div class="form-group">
				<label for="mobile">Mobile Number</label> <input type="tel"
					id="mobile" placeholder="Enter Mobile Number" name="mobNo" required>
			</div>

			<div class="form-group">
				<label for="email">Email ID</label> <input type="email" id="email"
					placeholder="Enter Email Address" name="email" required>
			</div>

			<button type="submit" class="btn">Register Employee</button>
		</form>
	</div>

</body>
</html>
